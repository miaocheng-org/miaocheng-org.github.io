# title: 
#   Miao Cheng 
#   Tohoku University

# 1. Activate the Minima Theme
theme: minima

# 2. Add Site-wide settings (required by many themes/plugins)
title: Your Awesome Personal Website
author:
  name: Your Name
  email: your-email@domain.com
description: >
  Write a brief description of your site here.

# 3. Minima-specific settings (required to resolve the SASS error)
minima:
  skin: auto # Or 'classic', 'dark', 'light', etc.
  
  # 4. To resolve the SASS error, we explicitly define the brand color as a static SASS color
  #    instead of the incompatible CSS variable (var(--minima-brand-color)).
  colors:
    brand: '#007ACC' # Example color: a nice blue. Choose any hex code you like.
  
